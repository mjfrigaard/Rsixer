url: https://mjfrigaard.github.io/Rsixer/

navbar:
  bg: primary       # paint the bar with primary (Bloomberg amber)
  type: dark        # light text for contrast on dark background

template:
  bootstrap: 5
  bslib:
    bg: "#0b0e13"          # Terminal background (near-black)
    fg: "#d5dde5"          # Body text (light grey)
    primary:   "#ff9e1b"   # Bloomberg amber       — buttons, headings, links
    secondary: "#00d9ff"   # Cyan                  — hover, secondary accents
    success:   "#2ecc71"   # Green                 — success, gains
    info:      "#4ea1ff"   # Bright cyan           — info accents
    warning:   "#ff9e1b"   # Bloomberg amber       — warning accent
    danger:    "#ff4d4f"   # Red                   — danger, losses
    body-bg:   "#0b0e13"   # Dark background
    body-color: "#d5dde5"  # Light text
    border-color: "#2a313b" # Dark borders
    code-color: "#00d9ff"  # Cyan for inline code
    code-bg:    "#12161d"  # Dark code background
    base_font:
      google: "IBM Plex Mono"
    heading_font:
      google: "IBM Plex Mono"
    code_font:
      google: "IBM Plex Mono"

